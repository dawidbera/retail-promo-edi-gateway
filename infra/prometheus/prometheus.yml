global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: 'edi-gateway'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:5288'] # Fallback local dev port of Web app
